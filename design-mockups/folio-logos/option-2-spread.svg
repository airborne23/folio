<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Folio">
  <!-- Cream paper background -->
  <rect width="80" height="80" rx="18" fill="#F5F0E5"/>
  <!-- Two pages of an open folio (book viewed from above) -->
  <!-- Left page -->
  <rect x="16" y="20" width="22" height="40" rx="1.5"
        fill="none" stroke="#191919" stroke-width="2.4"/>
  <!-- Right page -->
  <rect x="42" y="20" width="22" height="40" rx="1.5"
        fill="none" stroke="#191919" stroke-width="2.4"/>
  <!-- Spine fold line, caramel — the moment that makes it a folio not two cards -->
  <line x1="40" y1="18" x2="40" y2="62" stroke="#CC785C" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Faint text-line indicators on each page (3 lines per side) -->
  <g stroke="#191919" stroke-width="1" opacity="0.18">
    <line x1="20" y1="30" x2="34" y2="30"/>
    <line x1="20" y1="36" x2="34" y2="36"/>
    <line x1="20" y1="42" x2="32" y2="42"/>
    <line x1="46" y1="30" x2="60" y2="30"/>
    <line x1="46" y1="36" x2="60" y2="36"/>
    <line x1="46" y1="42" x2="58" y2="42"/>
  </g>
</svg>
